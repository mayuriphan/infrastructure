- name: Update apt cache
  apt:
    update_cache: yes
    force_apt_get: yes

- name: Install common packages
  apt:
    name:
      - git
      - curl
      - wget
      - vim
      - python3-pip
      - apt-transport-https
    state: present

- name: Install Docker
  apt:
    name: docker.io
    state: present

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

- name: Disable swap immediately
  command: swapoff -a
  when: ansible_swaptotal_mb > 0
  changed_when: false

- name: Disable swap permanently
  replace:
    path: /etc/fstab
    regexp: '^(?!#)(.*\sswap\s+.*)$'
    # regexp: '^([^#].*\sswap\s+sw\s+.*)$'
    replace: '# \1'