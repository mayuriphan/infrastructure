- name: Install Ansible dependencies
  apt:
    name:
      - ansible
      - git
      - python3-pip
    state: present

- name: Install AWS CLI
  apt:
    name: awscli
    state: present

- name: Install kubectl
  apt:
    name: kubectl
    state: present

- name: Install helm
  shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash