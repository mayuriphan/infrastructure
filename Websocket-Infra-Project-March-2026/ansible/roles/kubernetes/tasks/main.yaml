---

# =========================
# 1. Install dependencies
# =========================

- name: Install system dependencies
  apt:
    name:
      - curl
      - socat
      - conntrack
      - ipset
      - ebtables
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - iptables
    state: present
    update_cache: yes


# =========================
# 2. Load kernel modules
# =========================

- name: Load overlay module
  modprobe:
    name: overlay
    state: present

- name: Load br_netfilter module
  modprobe:
    name: br_netfilter
    state: present


# =========================
# 3. Configure Kubernetes networking sysctl
# =========================

- name: Configure sysctl for Kubernetes
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-ip6tables = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.ipv4.ip_forward = 1
    mode: '0644'


- name: Apply sysctl params
  command: sysctl --system


# =========================
# 4. Install container runtime
# =========================

- name: Install containerd
  apt:
    name: containerd
    state: present
    update_cache: yes


- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory


- name: Generate containerd config
  command: containerd config default
  register: containerd_config
  changed_when: false


- name: Write containerd config
  copy:
    dest: /etc/containerd/config.toml
    content: "{{ containerd_config.stdout }}"
    mode: '0644'


- name: Enable systemd cgroup driver
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'


- name: Restart containerd
  systemd:
    name: containerd
    state: restarted
    enabled: yes
    daemon_reload: yes


# =========================
# 5. Fix iptables mode (recommended)
# =========================

- name: Set iptables to legacy mode
  alternatives:
    name: iptables
    path: /usr/sbin/iptables-legacy

- name: Set ip6tables to legacy mode
  alternatives:
    name: ip6tables
    path: /usr/sbin/ip6tables-legacy


# =========================
# 6. Kubernetes repository
# =========================

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Kubernetes repo key
  get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: '0644'


- name: Add Kubernetes apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /"
    state: present


- name: Update apt cache
  apt:
    update_cache: yes


# =========================
# 7. Install Kubernetes packages
# =========================

- name: Install Kubernetes binaries
  apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present


- name: Hold Kubernetes packages
  command: apt-mark hold kubelet kubeadm kubectl


- name: Enable kubelet
  systemd:
    name: kubelet
    enabled: yes
    state: started


# =========================
# 8. Install crictl
# =========================

- name: Download crictl
  get_url:
    url: https://github.com/kubernetes-sigs/cri-tools/releases/download/v1.30.0/crictl-v1.30.0-linux-amd64.tar.gz
    dest: /tmp/crictl.tar.gz


- name: Extract crictl
  unarchive:
    src: /tmp/crictl.tar.gz
    dest: /usr/local/bin
    remote_src: yes


- name: Configure crictl
  copy:
    dest: /etc/crictl.yaml
    content: |
      runtime-endpoint: unix:///run/containerd/containerd.sock
      image-endpoint: unix:///run/containerd/containerd.sock
      timeout: 2
      debug: false


# =========================
# 9. Wait for container runtime
# =========================

- name: Wait for containerd socket
  wait_for:
    path: /run/containerd/containerd.sock
    timeout: 60


# =========================
# 10. Initialize master
# =========================

- name: Initialize Kubernetes master
  become: yes
  command: >
    kubeadm init
    --pod-network-cidr={{ pod_network_cidr }}
    --apiserver-advertise-address={{ ansible_default_ipv4.address }}
  args:
    creates: /etc/kubernetes/admin.conf
  register: kubeadm_init
  retries: 2
  delay: 30
  async: 900
  poll: 15
  run_once: true
  when: inventory_hostname in groups['master']

- name: Wait for Kubernetes API
  shell: |
    kubectl get nodes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: api_check
  retries: 20
  delay: 10
  until: api_check.rc == 0
  run_once: true
  when: inventory_hostname == groups['master'][0]

- name: Create .kube directory
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  when: inventory_hostname == groups['master'][0]

- name: Copy kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: yes
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  when: inventory_hostname == groups['master'][0]


# =========================
# 12. Generate join command
# =========================

- name: Generate kubeadm join command
  shell: kubeadm token create --print-join-command
  register: join_command
  when: inventory_hostname == groups['master'][0]


- name: Save join command
  set_fact:
    kube_join_cmd: "{{ join_command.stdout }}"
  when: inventory_hostname == groups['master'][0]


- name: Show join command
  debug:
    msg: "{{ join_command.stdout }}"
  when: inventory_hostname == groups['master'][0]


# =========================
# 13. Join worker nodes
# =========================

- name: Join worker nodes
  command: "{{ hostvars[groups['master'][0]].kube_join_cmd }}"
  args:
    creates: /etc/kubernetes/kubelet.conf
  when: inventory_hostname in groups['workers']


# =========================
# 14. Install CNI network
# =========================

- name: Ensure CNI directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /etc/cni/net.d
    - /opt/cni/bin

# -------------------------
#  Restart kubelet on all nodes
# -------------------------
- name: Restart kubelet
  systemd:
    name: kubelet
    state: restarted
    daemon_reload: yes

# -------------------------
# Install Flannel pods 
# -------------------------
- name: Install Flannel network plugin
  command: kubectl apply -f https://raw.githubusercontent.com/flannel-io/flannel/v0.25.4/Documentation/kube-flannel.yml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
  register: flannel_apply
  changed_when: "'configured' in flannel_apply.stdout or 'created' in flannel_apply.stdout"

# -------------------------
# Wait until all Flannel pods are Running on all nodes
# -------------------------
- name: Wait for all Flannel pods
  shell: |
    not_ready=$(kubectl get pods -n kube-flannel -l app=flannel \
      -o jsonpath='{.items[*].status.containerStatuses[*].ready}' | grep -c false)
    if [ "$not_ready" -eq 0 ]; then exit 0; else exit 1; fi
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  retries: 10
  delay: 15
  register: flannel_ready
  until: flannel_ready.rc == 0
  changed_when: false
  failed_when: flannel_ready.rc != 0
  run_once: true

- name: Remove loop plugin from CoreDNS configmap
  shell: |
    kubectl get configmap coredns -n kube-system -o yaml | \
      sed '/^        loop$/d' | \
      kubectl apply -f -
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true

- name: Restart CoreDNS to apply config
  command: kubectl rollout restart deployment/coredns -n kube-system
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true

- name: Wait for CoreDNS rollout
  command: kubectl rollout status deployment/coredns -n kube-system --timeout=120s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true

# -------------------------
# Wait for CoreDNS pods to be Ready
# -------------------------
- name: Wait for CoreDNS pods
  command: kubectl wait --for=condition=Ready pod -l k8s-app=kube-dns -n kube-system --timeout=300s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true
