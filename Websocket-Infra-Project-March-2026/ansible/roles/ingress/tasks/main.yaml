# -------------------------
# Ingress Controller
# -------------------------
- name: Ensure ingress namespace exists
  command: kubectl create ns ingress-nginx
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  ignore_errors: true
  run_once: true

# -------------------------
# Ingress Controller
# -------------------------
- name: Add ingress repo
  command: helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx/ --force-update
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true

- name: Update helm repos
  command: helm repo update
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true

- name: Install ingress controller
  command: >
    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
    --namespace ingress-nginx
    --create-namespace
    --version {{ ingress_chart_version }}
    --set controller.service.type=NodePort
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true

- name: Wait for ingress-nginx pods to be ready
  shell: |
    not_ready=$(kubectl get pods -n ingress-nginx -l app.kubernetes.io/name=ingress-nginx \
      -o jsonpath='{.items[*].status.containerStatuses[*].ready}' | grep -c false)
    if [ "$not_ready" -eq 0 ]; then exit 0; else exit 1; fi
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  retries: 20
  delay: 15
  register: ingress_ready
  until: ingress_ready.rc == 0
  changed_when: false
  failed_when: ingress_ready.rc != 0

# -------------------------
# External DNS
# -------------------------
- name: Add external-dns repo
  command: helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true

- name: Install external dns
  command: >
    helm upgrade --install external-dns external-dns/external-dns
    --namespace kube-system
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  run_once: true

